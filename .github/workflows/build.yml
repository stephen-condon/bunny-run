name: Build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Vet, Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libc6-dev libgles2-mesa-dev libgl1-mesa-dev xorg-dev xvfb

      - name: Vet
        run: go vet ./...

      - name: Test
        run: xvfb-run go test ./...

      - name: Build
        run: go build ./...
